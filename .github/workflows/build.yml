name: Build Windows EXE

on:
  push:
    branches: [main]
    tags:
      - 'v*'          # e.g. v2.0, v2.1 — triggers a GitHub Release
  workflow_dispatch:  # allows manual trigger from the Actions tab

jobs:
  build:
    name: Build EXE on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build FRAME.exe (GUI)
        run: pyinstaller FRAME.spec

      - name: Build FRAME_batch.exe (headless batch runner)
        run: pyinstaller FRAME_batch.spec

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frame-windows-exe
          path: dist/

      # --- only runs when a version tag (v*) is pushed ---
      - name: Create GitHub Release and upload EXEs
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/FRAME.exe
            dist/FRAME_batch.exe
          generate_release_notes: true
